name: k6 Concurrent Load Tests

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Backend URL (boş bırakılırsa RENDER_URL secret kullanılır)"
        required: false
        default: ""
      admin_key:
        description: "Admin key"
        required: false
        default: "admin123"

env:
  BASE_URL:  ${{ inputs.server_url || secrets.RENDER_URL || 'https://simplenewsvendorgame.onrender.com' }}
  ADMIN_KEY: ${{ inputs.admin_key  || secrets.ADMIN_KEY  || 'admin123' }}

jobs:
  k6:
    name: "poll_storm / concurrent_submit / health_storm / spike_join"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── k6 kurulumu ──────────────────────────────────────────────────────────
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
          k6 version

      # ── Backend'i uyandır ────────────────────────────────────────────────────
      - name: "Wake up backend"
        run: |
          echo "Pinging /health until it responds..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "$BASE_URL/health")
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "  Backend is up."; break; }
            [ "$i" = "6" ] && { echo "FAIL: backend did not respond"; exit 1; }
            sleep 10
          done

      # ── k6 çalıştır ─────────────────────────────────────────────────────────
      # Bu bir yük testi: Render free tier eşikleri aşabilir. Sonuç bilgilendirme
      # amaçlıdır, CI'ı kırmaz (continue-on-error + Propagate adımı yok).
      - name: Run k6 load tests
        id: k6
        run: |
          k6 run \
            --env BASE_URL="$BASE_URL" \
            --env ADMIN_KEY="$ADMIN_KEY" \
            --summary-export=k6-summary.json \
            --out json=k6-results.ndjson \
            k6/game_load_test.js
        continue-on-error: true

      # ── Özet rapor (informational) ───────────────────────────────────────────
      - name: Print threshold results
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys

          try:
              with open("k6-summary.json") as f:
                  s = json.load(f)
          except Exception as e:
              print(f"k6-summary.json okunamadı: {e}")
              sys.exit(0)

          metrics = s.get("metrics", {})

          # Threshold sonuçları metrics.<isim>.thresholds altındadır (top-level değil).
          # Değer biçimi k6 sürümüne göre değişir: klasik {"ok": bool} | v2 bare bool (True == aşıldı).
          def is_failed(v):
              if isinstance(v, dict):
                  return not v.get("ok", True)
              if isinstance(v, bool):
                  return v is True
              return False

          def stat(name, key):
              m = metrics.get(name, {})
              vals = m.get("values", m)   # nested (klasik) ya da flat (v2)
              v = vals.get(key)
              return f"{v:.1f}" if isinstance(v, (int, float)) else "–"

          print("\n" + "─" * 54)
          print("  k6 Threshold Sonuçları  (informational — CI'ı kırmaz)")
          print("─" * 54)
          any_fail = False
          for name, m in sorted(metrics.items()):
              th = m.get("thresholds")
              if not th:
                  continue
              for expr, v in th.items():
                  failed = is_failed(v)
                  any_fail = any_fail or failed
                  print(f"  {'FAIL ✗' if failed else 'PASS ✓'}  {name}: {expr}")

          print("\n" + "─" * 54)
          print("  Temel Metrikler")
          print("─" * 54)
          print(f"  submit_latency   avg={stat('submit_latency','avg')}ms  p95={stat('submit_latency','p(95)')}ms")
          print(f"  poll_latency     avg={stat('poll_latency','avg')}ms  p95={stat('poll_latency','p(95)')}ms")
          print(f"  join_latency     avg={stat('join_latency','avg')}ms  p95={stat('join_latency','p(95)')}ms")
          print(f"  game_errors      {stat('game_errors','count')}")
          print(f"  http_reqs total  {stat('http_reqs','count')}")
          print(f"  http_req_failed  {stat('http_req_failed','rate')}")
          print("─" * 54)

          if any_fail:
              print("\n⚠  Bazı eşikler aşıldı (Render free tier yükü altında beklenebilir).")
              print("   Bu adım bilgilendirme amaçlı; job yeşil kalır.")
          # informational: asla non-zero exit etme
          EOF

      # ── Artifact ─────────────────────────────────────────────────────────────
      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_id }}
          path: |
            k6-summary.json
            k6-results.ndjson
          retention-days: 30
